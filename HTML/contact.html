<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <header>
<nav class="page">
         <a href="../index.html"><b>Mon CV </b></a>
         <a href="contact.html"><b>Contact</b></a>
</nav>
    </header>
     <main>
        <h1>Nous contacter</h1>
    <div class="formu">
     <form >
        <fieldset>
            <legend>Formulaire de contact</legend>
            <label for="nom">Donner votre Nom:</label>
            <input type="text" id="nom"  name="nom" required><br>
            <label for="prenom"> Donner votre Prenom:</label>
            <input type="text" id="prenom" name="prenom" required><br>
            <label for="email">Votre E-mail</label>
            <input type="email" name="email" id="email" required placeholder="votree-mail@gmail.com"><br>
            <label for="telephone">Donner votre numero de telephone</label>
            <input type="tel" id="telephone" name="telephone" required placeholder="+221 7X XXX XX XX"> <br>
            <label for="message">Suggestion</label>
            <textarea name="message" id="message" required></textarea>
            <button type="submit">Envoyer</button>
        </fieldset>
    </form>
    </div>
     </main>
    
    <script src="..//JS/script.js"></script>
</body>
</html>
